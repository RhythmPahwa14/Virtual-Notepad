<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>

//  CONSTANTS 
const LM={WRIST:0,THUMB_CMC:1,THUMB_MCP:2,THUMB_IP:3,THUMB_TIP:4,INDEX_MCP:5,INDEX_PIP:6,INDEX_DIP:7,INDEX_TIP:8,MIDDLE_MCP:9,MIDDLE_PIP:10,MIDDLE_DIP:11,MIDDLE_TIP:12,RING_MCP:13,RING_PIP:14,RING_DIP:15,RING_TIP:16,PINKY_MCP:17,PINKY_PIP:18,PINKY_DIP:19,PINKY_TIP:20};
const G={PINCH:42,PALM_HOLD:500,SWIPE_VEL:800,MIN_STROKE:50,CURL:0.6,PALM_STAB:35};
const STROKE_W=10,MIN_PD=8,JITTER=3;
const T={CLOSE:0.2,INFLATE:0.7,SETTLE:0.5,SQUISH_IN:0.15,SQUISH_OUT:0.4,POP:0.25};
const SC={CAM_Z:10,FOV:50,BOB_AMP:0.1,BOB_MIN:0.5,BOB_MAX:1.5,ROT_MAX:0.3,DRIFT:0.02,COLL:1.5,DEPTH:0.8,INFL:1.2};
const VI={CUR:16,GLOW:30,PULSE:2,SKEL_A:0.25,SKEL_W:1.5};
const CONN=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

//  GESTURE DETECTOR 
class GestureDetector{
  constructor(){this.last=null;this.lt=0;this.gst=0;this.cur='none';this.prev='none';this.ph=[];this.vh=[];}
  detect(lms){
    const now=performance.now(),dt=this.lt>0?(now-this.lt)/1000:0;this.lt=now;
    if(!lms)return{current:'none',previous:this.prev,duration:0,velocity:{x:0,y:0}};
    const vel=this._vel(lms,dt),g=this._type(lms,vel);
    if(g!==this.cur){this.prev=this.cur;this.cur=g;this.gst=now;}
    this.last=lms;
    return{current:this.cur,previous:this.prev,duration:now-this.gst,velocity:vel};
  }
  _d(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
  _pc(lms){const w=lms.landmarks[LM.WRIST],i=lms.landmarks[LM.INDEX_MCP],p=lms.landmarks[LM.PINKY_MCP];return{x:(w.x+i.x+p.x)/3,y:(w.y+i.y+p.y)/3};}
  _vel(lms,dt){
    if(!this.last||dt===0)return{x:0,y:0};
    const c=this._pc(lms),l=this._pc(this.last),v={x:(c.x-l.x)/dt,y:(c.y-l.y)/dt};
    this.vh.push(v);if(this.vh.length>3)this.vh.shift();
    const s=this.vh.reduce((a,v)=>({x:a.x+v.x,y:a.y+v.y}),{x:0,y:0});
    return{x:s.x/this.vh.length,y:s.y/this.vh.length};
  }
  _ext(lms,tip,pip){const l=lms.landmarks;return this._d(l[tip],l[LM.WRIST])>this._d(l[pip],l[LM.WRIST])*G.CURL;}
  _thumb(lms){const l=lms.landmarks;return this._d(l[LM.THUMB_TIP],l[LM.INDEX_MCP])>this._d(l[LM.THUMB_TIP],l[LM.THUMB_IP])*1.5;}
  _stable(){
    if(this.ph.length<3)return false;
    const r=this.ph.slice(-3),f=r[0];
    for(const p of r)if(this._d(p,f)>G.PALM_STAB)return false;
    return true;
  }
  _type(lms,vel){
    const l=lms.landmarks,spd=Math.sqrt(vel.x*vel.x+vel.y*vel.y);
    if(spd>G.SWIPE_VEL&&Math.abs(vel.x)>Math.abs(vel.y)*1.5)return'swipe';
    if(this._d(l[LM.THUMB_TIP],l[LM.INDEX_TIP])<G.PINCH)return'pinch';
    if(!this._ext(lms,LM.INDEX_TIP,LM.INDEX_PIP)&&!this._ext(lms,LM.MIDDLE_TIP,LM.MIDDLE_PIP)&&!this._ext(lms,LM.RING_TIP,LM.RING_PIP)&&!this._ext(lms,LM.PINKY_TIP,LM.PINKY_PIP))return'fist';
    if(this._ext(lms,LM.INDEX_TIP,LM.INDEX_PIP)&&this._ext(lms,LM.MIDDLE_TIP,LM.MIDDLE_PIP)&&this._ext(lms,LM.RING_TIP,LM.RING_PIP)&&this._ext(lms,LM.PINKY_TIP,LM.PINKY_PIP)&&this._thumb(lms)){
      this.ph.push(this._pc(lms));if(this.ph.length>6)this.ph.shift();
      if(this.ph.length>=3&&this._stable())return'palm';
    }else{this.ph=[];}
    if(this._ext(lms,LM.INDEX_TIP,LM.INDEX_PIP)&&!this._ext(lms,LM.MIDDLE_TIP,LM.MIDDLE_PIP)&&!this._ext(lms,LM.RING_TIP,LM.RING_PIP)&&!this._ext(lms,LM.PINKY_TIP,LM.PINKY_PIP))return'draw';
    return'none';
  }
  getTip(lms){return lms.landmarks[LM.INDEX_TIP];}
  getPinch(lms){const t=lms.landmarks[LM.THUMB_TIP],i=lms.landmarks[LM.INDEX_TIP];return{x:(t.x+i.x)/2,y:(t.y+i.y)/2};}
}

//  HAND TRACKER 
class HandTracker{
  constructor(vid){
    this.vid=vid;this.cb=null;this.running=false;this.id=null;this.cW=640;this.cH=480;
    this.hands=new window.Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
    this.hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.65,minTrackingConfidence:0.5});
    this.hands.onResults(r=>this._res(r));
  }
  setSize(w,h){this.cW=w;this.cH=h;}
  _res(res){
    if(!this.cb)return;
    if(res.multiHandLandmarks&&res.multiHandLandmarks.length>0){
      const raw=res.multiHandLandmarks[0];
      const lms=raw.map(lm=>({x:(1-lm.x)*this.cW,y:lm.y*this.cH}));
      this.cb({landmarks:lms});
    }else{this.cb(null);}
  }

class DrawingCanvas{
  constructor(el){this.el=el;this.ctx=el.getContext('2d',{alpha:true});this.s=null;this.done=[];this.live=null;this.filt=null;this.buf=[];}
  resize(w,h){this.el.width=w;this.el.height=h;}
  start(pt,col){this.s={pts:[pt],col,closed:false};this.live=pt;this.filt=pt;this.buf=[pt];}
  add(pt){
    if(!this.s)return;
    const f=this._jit(pt);this.buf.push(f);if(this.buf.length>10)this.buf.shift();
    const sm=this._sm();this.live=sm;
    const last=this.s.pts[this.s.pts.length-1];
    if(this._d(sm,last)>=MIN_PD)this.s.pts.push(sm);
  }
  _jit(pt){if(!this.filt){this.filt=pt;return pt;}if(this._d(pt,this.filt)<JITTER)return this.filt;this.filt=pt;return pt;}
  _sm(){if(!this.buf.length)return{x:0,y:0};let sx=0,sy=0;for(const p of this.buf){sx+=p.x;sy+=p.y;}return{x:sx/this.buf.length,y:sy/this.buf.length};}
  updLive(pt){const f=this._jit(pt);this.buf.push(f);if(this.buf.length>10)this.buf.shift();this.live=this._sm();}
  clrLive(){this.live=null;this.filt=null;this.buf=[];}
  close(){
    if(!this.s)return null;
    if(this._len()<G.MIN_STROKE){this.s=null;return null;}
    if(this.s.pts.length>2){this.s.closed=true;const s={...this.s};this.done.push(s);this.s=null;return s;}
    this.s=null;return null;
  }
  _len(){if(!this.s||this.s.pts.length<2)return 0;let l=0;for(let i=1;i<this.s.pts.length;i++)l+=this._d(this.s.pts[i-1],this.s.pts[i]);return l;}
  clearAll(){this.s=null;this.done=[];this.ctx.clearRect(0,0,this.el.width,this.el.height);}
  clear(){this.ctx.clearRect(0,0,this.el.width,this.el.height);}
  rm(s){const i=this.done.indexOf(s);if(i>-1)this.done.splice(i,1);}
  render(){
    this.clear();

  }
  _live(s,a){

    else{this._curve(pts);this.ctx.stroke();}

  }
  _stroke(s,a){
    if(!s.pts.length)return;
    this.ctx.save();this.ctx.globalAlpha=a;this.ctx.fillStyle=s.col;this.ctx.strokeStyle=s.col;this.ctx.lineWidth=STROKE_W;this.ctx.lineCap='round';this.ctx.lineJoin='round';

  _curve(pts){
    if(pts.length<2)return;

  }
  closeAnim(s,prog){

  _path(s){let pts=[...s.pts];if(s.closed)pts.push(s.pts[0]);this._curve(pts);}
  _d(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
}

//  HAND VISUALIZER 
class HandVisualizer{
  constructor(el){this.el=el;this.ctx=el.getContext('2d');this.pulse=0;}
  resize(w,h){this.el.width=w;this.el.height=h;}
  clear(){this.ctx.clearRect(0,0,this.el.width,this.el.height);}
  render(lms,g,col,dt){
    this.clear();if(!lms)return;this.pulse+=dt*VI.PULSE;
    this._sk(lms);const tip=lms.landmarks[LM.INDEX_TIP];this._cur(tip.x,tip.y,col,g);
  }
  _sk(lms){
    this.ctx.save();this.ctx.globalAlpha=VI.SKEL_A;this.ctx.strokeStyle='white';this.ctx.lineWidth=VI.SKEL_W;this.ctx.lineCap='round';
    for(const[f,t]of CONN){const s=lms.landmarks[f],e=lms.landmarks[t];this.ctx.beginPath();this.ctx.moveTo(s.x,s.y);this.ctx.lineTo(e.x,e.y);this.ctx.stroke();}
    this.ctx.fillStyle='white';for(const lm of lms.landmarks){this.ctx.beginPath();this.ctx.arc(lm.x,lm.y,2.5,0,Math.PI*2);this.ctx.fill();}
    this.ctx.restore();
  }
  _cur(x,y,col,g){
    const p=g.current==='draw'?Math.sin(this.pulse)*0.3+1:1;
    this.ctx.save();
    const gr=this.ctx.createRadialGradient(x,y,0,x,y,VI.GLOW*p);
    gr.addColorStop(0,col);gr.addColorStop(0.3,this._rgba(col,0.5));gr.addColorStop(1,this._rgba(col,0));
    this.ctx.fillStyle=gr;this.ctx.beginPath();this.ctx.arc(x,y,VI.GLOW*p,0,Math.PI*2);this.ctx.fill();
    this.ctx.fillStyle=col;this.ctx.shadowColor=col;this.ctx.shadowBlur=10;
    this.ctx.beginPath();this.ctx.arc(x,y,VI.CUR/2*p,0,Math.PI*2);this.ctx.fill();
    this.ctx.fillStyle='white';this.ctx.beginPath();this.ctx.arc(x,y,VI.CUR/4,0,Math.PI*2);this.ctx.fill();
    this.ctx.restore();
  }
  _rgba(hex,a){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);if(!r)return`rgba(255,255,255,${a})`;return`rgba(${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)},${a})`;}
}

  s2w(sx,sy,z=0){

}

//  BALLOON INFLATOR 
class BalloonInflator{
  constructor(cam,cW,cH){this.cam=cam;this.cW=cW;this.cH=cH;}
  setSize(w,h){this.cW=w;this.cH=h;}
  make(stroke){
    const pts=this._simp(stroke.pts,20),shape=this._shape(pts);
    let geo=new THREE.ExtrudeGeometry(shape,{depth:SC.DEPTH,bevelEnabled:true,bevelThickness:0.3,bevelSize:0.3,bevelSegments:8,curveSegments:24});
    geo.center();geo=this._infl(geo);
    const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(stroke.col),roughness:0.35,metalness:0,side:THREE.DoubleSide});
    const mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;mesh.receiveShadow=true;
    const ctr=this._ctr(stroke.pts);mesh.position.copy(this._s2w(ctr.x,ctr.y));
    const sz=this._sz(stroke.pts),sc=Math.max(sz.w,sz.h)/600;mesh.scale.set(sc,sc,sc);
    return mesh;
  }
  _simp(pts,n){if(pts.length<=n)return pts;const s=pts.length/n,r=[];for(let i=0;i<n;i++)r.push(pts[Math.min(Math.floor(i*s),pts.length-1)]);return r;}
  _shape(pts){
    if(pts.length<3){const s=new THREE.Shape();s.absarc(0,0,1,0,Math.PI*2,false);return s;}
    const c=this._ctr(pts),np=pts.map(p=>({x:(p.x-c.x)/50,y:-(p.y-c.y)/50}));
    const curve=new THREE.CatmullRomCurve3(np.map(p=>new THREE.Vector3(p.x,p.y,0)),true,'catmullrom',0.5);
    const sp=curve.getPoints(64),shape=new THREE.Shape();shape.moveTo(sp[0].x,sp[0].y);
    for(let i=1;i<sp.length;i++)shape.lineTo(sp[i].x,sp[i].y);
    shape.closePath();return shape;
  }
  _infl(geo){
    const pos=geo.getAttribute('position');if(!pos)return geo;
    geo.computeBoundingBox();const c=new THREE.Vector3();geo.boundingBox.getCenter(c);
    const arr=new Float32Array(pos.count*3);
    for(let i=0;i<pos.count;i++){
      const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i),dx=x-c.x,dy=y-c.y,dz=z-c.z,d=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(d>0.001){const ia=SC.INFL*0.1;arr[i*3]=x+(dx/d)*ia;arr[i*3+1]=y+(dy/d)*ia;arr[i*3+2]=z+(dz/d)*ia;}
      else{arr[i*3]=x;arr[i*3+1]=y;arr[i*3+2]=z;}
    }
    geo.setAttribute('position',new THREE.BufferAttribute(arr,3));geo.computeVertexNormals();return geo;
  }
  _ctr(pts){const s=pts.reduce((a,p)=>({x:a.x+p.x,y:a.y+p.y}),{x:0,y:0});return{x:s.x/pts.length,y:s.y/pts.length};}
  _sz(pts){let mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;for(const p of pts){mnX=Math.min(mnX,p.x);mxX=Math.max(mxX,p.x);mnY=Math.min(mnY,p.y);mxY=Math.max(mxY,p.y);}return{w:mxX-mnX,h:mxY-mnY};}
  _s2w(sx,sy){const v=new THREE.Vector3((sx/this.cW)*2-1,-(sy/this.cH)*2+1,0.5);v.unproject(this.cam);const d=v.sub(this.cam.position).normalize(),dist=-this.cam.position.z/d.z;return this.cam.position.clone().add(d.multiplyScalar(dist));}
}

//  OBJECT MANAGER 
class ObjectManager{
  constructor(scene,cW,cH){this.scene=scene;this.infl=new BalloonInflator(scene.cam(),cW,cH);this.objs=[];this.n=0;}
  setSize(w,h){this.infl.setSize(w,h);}
  async create(stroke){
    const mesh=this.infl.make(stroke);mesh.scale.set(0.001,0.001,0.001);
    const obj={id:`b${this.n++}`,mesh,col:stroke.col,pos:mesh.position.clone(),tgt:mesh.position.clone(),
      rot:new THREE.Vector3((Math.random()-.5)*SC.ROT_MAX,(Math.random()-.5)*SC.ROT_MAX,(Math.random()-.5)*SC.ROT_MAX),
      bo:Math.random()*Math.PI*2,bs:SC.BOB_MIN+Math.random()*(SC.BOB_MAX-SC.BOB_MIN),
      scale:1,grabbed:false,sq:0};
    this.scene.add(mesh);this.objs.push(obj);await this._inflate(obj);this._balance(obj);return obj;
  }
  _inflate(obj){return new Promise(r=>{gsap.delayedCall(0.3,()=>{gsap.to(obj.mesh.scale,{x:1,y:1,z:1,duration:T.INFLATE,ease:'elastic.out(1,0.5)',onComplete:r});gsap.to(obj.mesh.rotation,{y:obj.mesh.rotation.y+Math.PI*0.25,duration:T.INFLATE,ease:'power2.out'});});});}
  _balance(obj){
    const p=obj.pos.clone();
    for(const o of this.objs){if(o.id===obj.id)continue;const diff=new THREE.Vector3().subVectors(p,o.pos);const d=diff.length();if(d<SC.COLL){diff.normalize().multiplyScalar((SC.COLL-d)/SC.COLL*0.5);p.add(diff);}}
    p.x=Math.max(-4,Math.min(4,p.x));p.y=Math.max(-3,Math.min(3,p.y));p.z=Math.max(-2,Math.min(2,p.z));
    obj.tgt=p;gsap.to(obj.mesh.position,{x:p.x,y:p.y,z:p.z,duration:T.SETTLE,ease:'power2.out'});
  }
  update(dt,et){
    for(const obj of this.objs){
      if(obj.grabbed)continue;
      obj.mesh.rotation.x+=obj.rot.x*dt;obj.mesh.rotation.y+=obj.rot.y*dt;obj.mesh.rotation.z+=obj.rot.z*dt;
      obj.mesh.position.y=obj.tgt.y+Math.sin(et*obj.bs+obj.bo)*SC.BOB_AMP;
      obj.mesh.position.x+=Math.sin(et*0.2+obj.bo)*SC.DRIFT*dt;
      this._coll(obj,dt);
      if(obj.sq>0){const sq=1-obj.sq*0.3,ex=1+obj.sq*0.15;obj.mesh.scale.set(obj.scale*ex,obj.scale*sq,obj.scale*ex);}
    }
  }
  _coll(obj,dt){for(const o of this.objs){if(o.id===obj.id)continue;const diff=new THREE.Vector3().subVectors(obj.mesh.position,o.mesh.position);const d=diff.length();if(d<SC.COLL&&d>0.001){const f=((SC.COLL-d)/SC.COLL)*dt*2;diff.normalize().multiplyScalar(f);obj.mesh.position.add(diff);obj.tgt.add(diff.clone().multiplyScalar(0.5));}}}
  poke(obj){gsap.to(obj,{sq:1,duration:T.SQUISH_IN,ease:'power2.out',onComplete:()=>gsap.to(obj,{sq:0,duration:T.SQUISH_OUT,ease:'elastic.out(1,0.3)'})});gsap.to(obj.mesh.rotation,{x:obj.mesh.rotation.x+(Math.random()-.5)*0.5,y:obj.mesh.rotation.y+(Math.random()-.5)*0.5,duration:0.3,ease:'elastic.out(1,0.5)'});}
  grab(obj){obj.grabbed=true;gsap.killTweensOf(obj.mesh.position);gsap.to(obj.mesh.scale,{x:1.1,y:1.1,z:1.1,duration:0.15,ease:'power2.out'});}
  move(obj,sx,sy){if(!obj.grabbed)return;obj.mesh.position.copy(this.scene.s2w(sx,sy,0));obj.pos.copy(obj.mesh.position);}
  release(obj){obj.grabbed=false;obj.tgt.copy(obj.mesh.position);gsap.to(obj.mesh.scale,{x:1,y:1,z:1,duration:0.3,ease:'elastic.out(1,0.5)'});for(const o of this.objs)if(o.id!==obj.id)this._balance(o);}
  async rm(obj,fade=false){const i=this.objs.indexOf(obj);if(i===-1)return;this.objs.splice(i,1);return new Promise(r=>{const fin=()=>{this.scene.remove(obj.mesh);obj.mesh.geometry.dispose();obj.mesh.material.dispose();r();};if(fade){gsap.to(obj.mesh.scale,{x:0,y:0,z:0,duration:T.POP,ease:'power2.in',onComplete:fin});}else{gsap.to(obj.mesh.scale,{x:1.3,y:1.3,z:1.3,duration:0.1,ease:'power2.out',onComplete:()=>gsap.to(obj.mesh.scale,{x:0,y:0,z:0,duration:T.POP,ease:'power2.in',onComplete:fin})});}});}
  async clearAll(){const c=[...this.objs];await Promise.all(c.map((o,i)=>new Promise(r=>gsap.delayedCall(i*0.08,async()=>{await this.rm(o,true);r();}))));this.objs=[];}
  getAt(sx,sy){const h=this.scene.ray(sx,sy,this.objs.map(o=>o.mesh));if(h.length>0)return this.objs.find(o=>o.mesh===h[0].object)||null;return null;}
  rotate(obj,dx,dy){obj.mesh.rotation.y+=dx;obj.mesh.rotation.x+=dy;}
}

//  MULTIPLAYER 
class Multiplayer{
  constructor(){this.peer=null;this.conns=new Map();this.code=this._gen();this.onSt=null;this.onEv=null;}
  _gen(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
  getCode(){return this.code;}
  onStatus(cb){this.onSt=cb;}onEvent(cb){this.onEv=cb;}
  _st(s,m){if(this.onSt)this.onSt(s,m);}
  _ev(e){if(this.onEv)this.onEv(e);}
  async init(){return new Promise((res,rej)=>{this.peer=new window.Peer(`aircanvas-${this.code}`,{debug:0});this.peer.on('open',()=>{this._st('disconnected','Ready');res();});this.peer.on('connection',c=>this._hc(c));this.peer.on('error',e=>{if(e.type==='unavailable-id'){this.code=this._gen();this.peer.destroy();this.init().then(res).catch(rej);}else this._st('disconnected','Error');});}); }
  _hc(conn){const id=conn.peer;conn.on('open',()=>{this.conns.set(id,conn);this._st('connected',`Connected (${this.conns.size})`);this._ev({type:'peer_joined'});});conn.on('data',d=>{this._ev(d);this.conns.forEach((c,k)=>{if(k!==id&&c.open)c.send(d);});});conn.on('close',()=>{this.conns.delete(id);this._st(this.conns.size?'connected':'disconnected',this.conns.size?`Connected (${this.conns.size})`:'Not connected');this._ev({type:'peer_left'});});}
  async join(code){if(!this.peer)throw new Error('Not init');this._st('connecting','Connecting');return new Promise((res,rej)=>{const conn=this.peer.connect(`aircanvas-${code.toUpperCase()}`,{reliable:true});const tmr=setTimeout(()=>{conn.close();this._st('disconnected','Timeout');rej(new Error('Timeout'));},10000);conn.on('open',()=>{clearTimeout(tmr);this._hc(conn);res();});conn.on('error',e=>{clearTimeout(tmr);this._st('disconnected','Failed');rej(e);});});}
  broadcast(e){this.conns.forEach(c=>{if(c.open)c.send(e);});}
  connected(){return this.conns.size>0;}
}

    this.vis      =new HandVisualizer(this.hCanvas);
    this.scene    =new Scene3D(this.sCanvas);
    this.objs     =new ObjectManager(this.scene,innerWidth,innerHeight);
    this.mp       =new Multiplayer();

    this.color='#FFB3BA';this.drawing2=false;this.lastG=null;this.lms=null;
    this.palmT=0;this.grabbed=null;this.lastPinch=null;this.lft=0;
    this.isDrag=false;this.lmx=0;this.lmy=0;this.selObj=null;
    this.pvDrag=false;this.pvSX=0;this.pvSY=0;this.pvL=0;this.pvT=0;

    this._resize();this._ui();this._mp();this._init();
  }
  _ui(){
    window.addEventListener('resize',()=>this._resize());
    this.swatches.forEach(s=>s.addEventListener('click',()=>{this.swatches.forEach(x=>x.classList.remove('active'));s.classList.add('active');this.color=s.dataset.color||'#FFB3BA';}));
    const sc=this.sCanvas;
    sc.addEventListener('mousedown',e=>{this.isDrag=true;this.lmx=e.clientX;this.lmy=e.clientY;const h=this.objs.getAt(e.clientX,e.clientY);if(h)this.selObj=h;});
    sc.addEventListener('mousemove',e=>{if(!this.isDrag)return;const dx=e.clientX-this.lmx,dy=e.clientY-this.lmy;if(this.selObj)this.objs.rotate(this.selObj,dx*0.01,dy*0.01);else this.scene.orbit(dx*0.005,dy*0.005);this.lmx=e.clientX;this.lmy=e.clientY;});
    sc.addEventListener('mouseup',()=>{this.isDrag=false;this.selObj=null;});
    sc.addEventListener('wheel',e=>{e.preventDefault();this.scene.zoom(e.deltaY*0.001);},{passive:false});
    sc.addEventListener('touchstart',e=>{if(e.touches.length===1){this.isDrag=true;this.lmx=e.touches[0].clientX;this.lmy=e.touches[0].clientY;const h=this.objs.getAt(e.touches[0].clientX,e.touches[0].clientY);if(h)this.selObj=h;}});
    sc.addEventListener('touchmove',e=>{if(!this.isDrag||e.touches.length!==1)return;const dx=e.touches[0].clientX-this.lmx,dy=e.touches[0].clientY-this.lmy;if(this.selObj)this.objs.rotate(this.selObj,dx*0.01,dy*0.01);else this.scene.orbit(dx*0.005,dy*0.005);this.lmx=e.touches[0].clientX;this.lmy=e.touches[0].clientY;});
    sc.addEventListener('touchend',()=>{this.isDrag=false;this.selObj=null;});
    document.getElementById('clear-all-btn').addEventListener('click',()=>this._clear());
    document.getElementById('invite-btn').addEventListener('click',()=>this.modal.classList.add('visible'));
    document.getElementById('modal-close').addEventListener('click',()=>this.modal.classList.remove('visible'));
    this.modal.addEventListener('click',e=>{if(e.target===this.modal)this.modal.classList.remove('visible');});
    document.getElementById('copy-code-btn').addEventListener('click',()=>this._copy());
    document.getElementById('join-room-btn').addEventListener('click',()=>this._join());
    this.joinInp.addEventListener('keypress',e=>{if(e.key==='Enter')this._join();});
    const pv=document.getElementById('camera-preview');
    document.getElementById('preview-expand-btn').addEventListener('click',e=>{e.stopPropagation();pv.classList.toggle('expanded');});
    pv.addEventListener('mousedown',e=>{if(e.target.id==='preview-expand-btn')return;this.pvDrag=true;this.pvSX=e.clientX;this.pvSY=e.clientY;const r=pv.getBoundingClientRect();this.pvL=r.left;this.pvT=r.top;pv.classList.add('dragging');});
    document.addEventListener('mousemove',e=>{if(!this.pvDrag)return;let l=this.pvL+(e.clientX-this.pvSX),t=this.pvT+(e.clientY-this.pvSY);const r=pv.getBoundingClientRect();l=Math.max(0,Math.min(l,innerWidth-r.width));t=Math.max(0,Math.min(t,innerHeight-r.height));pv.classList.add('custom-position');pv.style.left=l+'px';pv.style.top=t+'px';});
    document.addEventListener('mouseup',()=>{if(this.pvDrag){this.pvDrag=false;pv.classList.remove('dragging');}});
    pv.addEventListener('dblclick',e=>{if(e.target.id==='preview-expand-btn')return;pv.classList.remove('custom-position');pv.style.left='';pv.style.top='';});
  }
  _mp(){
    this.mp.init().then(()=>{this.rcEl.textContent=this.mp.getCode();}).catch(()=>{});
    this.mp.onStatus((s,m)=>{this.stDot.className='status-dot';if(s==='connected')this.stDot.classList.add('connected');else if(s==='connecting')this.stDot.classList.add('connecting');this.stText.textContent=m;});
    this.mp.onEvent(e=>{if(e.type==='balloon_created')this.objs.create(e.stroke);else if(e.type==='clear_all'){this.drawing.clearAll();this.objs.clearAll();}else if(e.type==='peer_joined')this._msg('Friend joined!',2000);else if(e.type==='peer_left')this._msg('Friend left',2000);});
  }
  async _copy(){const c=this.mp.getCode();try{await navigator.clipboard.writeText(c);}catch{const ta=document.createElement('textarea');ta.value=c;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}const b=document.getElementById('copy-code-btn');b.textContent='';setTimeout(()=>b.textContent='',2000);}
  async _join(){const code=this.joinInp.value.trim().toUpperCase();if(code.length!==6){this.stText.textContent='Enter 6-char code';return;}try{await this.mp.join(code);this._msg('Connected!',2000);}catch{this.stText.textContent='Failed to connect';}}
  async _init(){
    try{
      await this.tracker.start(lms=>this._onHand(lms));
      if(this.webcam.srcObject){this.prevVid.srcObject=this.webcam.srcObject;this.prevVid.play();}
      this.prevCv.width=280;this.prevCv.height=210;
      this.loading.classList.add('hidden');this._loop();
    }catch(e){console.error(e);this.loading.classList.add('hidden');this._msg('Camera access denied — please allow camera and refresh.');}
  }
  _resize(){const w=innerWidth,h=innerHeight;this.tracker.setSize(w,h);this.drawing.resize(w,h);this.vis.resize(w,h);this.scene.resize(w,h);this.objs.setSize(w,h);}
  _onHand(lms){this.lms=lms;if(!lms){if(this.drawing2)this.drawing2=false;return;}const g=this.detector.detect(lms);this._gesture(g,lms);this.lastG=g;this._preview(lms);}
  _preview(lms){
    const pw=this.prevCv.width||280,ph=this.prevCv.height||210;this.prevCtx.clearRect(0,0,pw,ph);if(!lms)return;
    const scale=Math.min(pw/innerWidth,ph/innerHeight),ox=(pw-innerWidth*scale)/2,oy=(ph-innerHeight*scale)/2;
    this.prevCtx.strokeStyle='#6366f1';this.prevCtx.lineWidth=1.5;
    for(const[f,t]of CONN){const s=lms.landmarks[f],e=lms.landmarks[t];this.prevCtx.beginPath();this.prevCtx.moveTo(s.x*scale+ox,s.y*scale+oy);this.prevCtx.lineTo(e.x*scale+ox,e.y*scale+oy);this.prevCtx.stroke();}
    this.prevCtx.fillStyle='#6366f1';for(const lm of lms.landmarks){this.prevCtx.beginPath();this.prevCtx.arc(lm.x*scale+ox,lm.y*scale+oy,2.5,0,Math.PI*2);this.prevCtx.fill();}
  }
  _gesture(g,lms){
    const tip=this.detector.getTip(lms);
    switch(g.current){
      case'draw':this._doDraw(tip);break;
      case'pinch':this._doPinch(lms);break;
      case'palm':this._doPalm();break;
      case'swipe':this._doSwipe(tip);break;
      default:if(this.grabbed){this.objs.release(this.grabbed);this.grabbed=null;this.lastPinch=null;}
    }
    if(this.lastG&&g.current!==this.lastG.current){this.palmT=0;if(this.lastG.current==='draw')this.drawing.clrLive();}
  }
  _doDraw(pos){
    this.drawing.updLive(pos);const hit=this.objs.getAt(pos.x,pos.y);if(hit){this.objs.poke(hit);return;}
    if(!this.drawing2){this.drawing2=true;this.drawing.start(pos,this.color);}else this.drawing.add(pos);this.drawing.render();
  }
  _doPinch(lms){
    const pc=this.detector.getPinch(lms);if(this.drawing2){this.drawing2=false;}
    if(!this.grabbed){const hit=this.objs.getAt(pc.x,pc.y);if(hit){this.grabbed=hit;this.objs.grab(hit);this.lastPinch=pc;}}
    else{if(this.lastPinch){const dx=pc.x-this.lastPinch.x,dy=pc.y-this.lastPinch.y;this.objs.move(this.grabbed,pc.x,pc.y);this.objs.rotate(this.grabbed,dx*0.02,dy*0.02);}this.lastPinch=pc;}
  }
  _doPalm(){
    if(this.grabbed){this.objs.release(this.grabbed);this.grabbed=null;this.lastPinch=null;}
    if(!this.palmT)this.palmT=performance.now();
    if(performance.now()-this.palmT>=G.PALM_HOLD){this._inflate();this.palmT=0;}
  }
  _doSwipe(pos){const hit=this.objs.getAt(pos.x,pos.y);if(hit)this.objs.rm(hit);}
  async _inflate(){
    const stroke=this.drawing.close();this.drawing.clrLive();
    if(!stroke){this._msg('Draw a bigger shape',1000);return;}
    this.drawing2=false;const t0=performance.now();
    const anim=()=>{const p=Math.min((performance.now()-t0)/(T.CLOSE*1000),1);this.drawing.closeAnim(stroke,p);if(p<1)requestAnimationFrame(anim);else this._spawn(stroke);};anim();
  }
  async _spawn(stroke){
    this.drawing.rm(stroke);this.drawing.clear();
    try{const obj=await this.objs.create(stroke);if(this.mp.connected())this.mp.broadcast({type:'balloon_created',stroke});}
    catch(e){console.error(e);this._msg('Failed to create shape',2000);}
  }
  async _clear(){this._msg('Clearing');this.drawing.clearAll();await this.objs.clearAll();this._hide();if(this.mp.connected())this.mp.broadcast({type:'clear_all'});}
  _loop(){requestAnimationFrame(()=>this._loop());const now=performance.now(),dt=this.lft>0?(now-this.lft)/1000:0.016;this.lft=now;this.objs.update(dt,now/1000);this.scene.render();this.drawing.render();const g=this.lastG||{current:'none',previous:'none',duration:0,velocity:{x:0,y:0}};this.vis.render(this.lms,g,this.color,dt);}
  _msg(m,d){this.statMsg.textContent=m;this.statMsg.classList.add('visible');if(d)setTimeout(()=>this._hide(),d);}
  _hide(){this.statMsg.classList.remove('visible');}
}

document.addEventListener('DOMContentLoaded', () => {
  new AirCanvas();
});
</script>
